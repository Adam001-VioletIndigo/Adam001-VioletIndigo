<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/img/icon.png">
    <title>404 Not Found</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0e27, #1a1f3a 50%, #0f1535);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff, #00f6ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            font-size: 18px;
            color: #c0c0c0;
            margin: 10px 0;
        }
        .btlink {
            color: #00f6ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btlink:hover {
            color: #5927ba;
            text-shadow: 0 0 15px rgba(0, 246, 255, 0.6);
        }
        hr {
            width: 200px;
            margin: 30px auto;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <h1>404 - 页面未找到</h1>
    <p>请检查地址拼写是否正确，或回到首页重新进入</p>
    <hr>
    <p><a href="index.html" class="btlink">返回首页</a></p>
    <p style="font-size: 14px; color: #888; margin-top: 30px;">By Adam001</p>
</body>
</html>
