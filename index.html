<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Adam001的小站</title>
    <style>
        @font-face {
            font-family: 'Main'; 
            src: url('fonts/字魂59号-创粗黑.ttf') format('truetype'); 
        }
        @font-face {
            font-family: 'DYH'; 
            src: url('fonts/SmileySans-Oblique.ttf') format('truetype'); 
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0; 
            padding: 0;
            background-color: #333;
            /*background: url('/img/LOGO.png'); 
            background-position: center center;
            background-size: contain;*/
        }

        header {
            background-color: #333;
            color: #fff;
            display: flex;
            align-items: center;
            padding: 1%;
            position: fixed;
            text-align: center;
            width: 100%;
            top:0%;
            height: 8%;
        }
         header h1 {
            font-family:'DYH',Serif;
            margin: 0;
            color:#f5f5f5;
        }
        nav {
            background-color: #333;
            color: #fff;
            padding: auto;
            text-align: center;
            display: flex;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            padding: 5px 10px;
            margin: 0 5px;
            border: 1px solid transparent;
            border-radius: 4px;
        }

        nav a:hover {
            background-color: #5927BA;
            border: 1px solid #5927BA;
        }

        main {
            padding: 20px; /* 添加内边距 */
            margin-top: 20px; /* 与头部或导航栏保持一定的距离 */
        }
        .container_1:before {
            content: "";
            display: block;
            height: 60px; /* 假设header的高度是60px */
        }
        section {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0px 0px rgba(0, 0, 0, 0.);
            margin-top:1%;
            
        }
        .glass-effect {
            position: relative;
            overflow: hidden; /* 确保伪元素不会超出section的边界 */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(10px);
            border-radius: 10px; /* 可根据需要调整圆角 */
        }
 
        .glass-effect::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.5); /* 背景颜色可以根据需要调整 */
            backdrop-filter: blur(10px);
            border-radius: inherit;
            z-index: 1; /* 设置伪元素的z-index */
        }
        .section-content {
            position: relative; /* 确保内容可以定位，‌并且具有z-index属性 */
            z-index: 2; /* 设置内容的z-index高于伪元素 */
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 0%;
            bottom: 0;
            width: 100%;
        }
        footer a{
            color:#fff;
            font-size: 14px;
        }
        footer p {
            font-size: 14px;
            text-align: left;
            
        }
        .logo {
            float: left; /* LOGO浮动到左边 */
            margin-right: 10px; /* 图文间隔 */
  }
        p{
            color:#f5f5f5;
            font-family:'Main',Serif;
            font-size: 24px;
            line-height: 26px;
        }
        h1{
            color:#f5f5f5;
            font-family:'DYH',Serif;
            font-size: 30px;
        }
        h2{
            color:#f5f5f5;
            font-family:'DYH',Serif;
            font-size: 30px;
        }
        h3{
            color:#f5f5f5;
            font-family:'Main',Serif;
            font-size: 20px;
        }
        a{
            color:#00f6ff;
        }
        
        .download-btn {
        display: inline-block;
        padding: 10px 20px;
        font-size: 16px;
        color: white;
        background-color: #333;
        border: none;
        border-radius: 4px;    
        cursor: pointer;
        text-decoration: none; /* 去除下划线 */
        }
        .download-btn:hover {
            background-color: #5927BA;
        }
        .card {
            border: 1px solid #ccc;
            background-color: #111111;
            border-radius: 15px;
            padding: 1%;
            margin: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s; /*过渡效果*/
        }
            
        .card:hover {
            transform: scale(1.05); /*悬停放大*/
        }
        .container {
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden; /* 防止悬浮图片超出容器时溢出 */
        }

        .image_0 {
            width: 100%;
            height: auto;
            display: block; /* 移除图片下方的默认空白 */
        }

        .overlay_1{
            position: absolute;
            top: 10px; 
            left: 50%; 
            width: 100%; /* 或者你需要的宽度 */
            height: auto; /* 保持图片比例 */
        }
        
        
        
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.body.addEventListener('contextmenu', function(event) {
            event.preventDefault();
            // alert('右键菜单已被禁用！');
        }, false);
    });
    
    document.addEventListener('DOMContentLoaded', function() {
    const card = document.querySelector('.card');

    if (card) {
        card.addEventListener('click', function() {
            const url = card.getAttribute('data-url');
            if (url) {
                window.location.href = url;
            }
        });
    } else {
        console.error('未找到匹配的 .card 元素。');
    }
});
   
    
</script>
