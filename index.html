<!DOCTYPE html>
<html lang="zh">
<head>
    <meta http-equiv="content-type" content="text/html; charset=UTF-8">
    <meta name="description" content="Adam001的站点，极致创新，技术无限！">
    <meta name="keywords" content="">
    <meta property="og:title" content="Adam001的站点">
    <meta property="og:description" content="Adam001的站点，极致创新，技术无限！">
    <meta property="og:type" content="website">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no,minimal-ui">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/icon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/icon.png">
    <title>Adam001的站点</title>
    <style>
        @font-face {
            font-family: 'Main'; 
            src: url('fonts/字魂59号-创粗黑.ttf') format('truetype'); 
        }
        @font-face {
            font-family: 'DYH'; 
            src: url('fonts/SmileySans-Oblique.ttf') format('truetype'); 
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1535 100%);
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 30px;
        }
        
        header h1 {
            font-family: 'DYH', serif;
            font-size: 28px;
            background: linear-gradient(135deg, #00f6ff 0%, #5927ba 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        
        nav {
            display: flex;
            gap: 10px;
        }

        nav a {
            color: #b0b0b0;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #00f6ff, #5927ba);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        nav a:hover {
            color: #00f6ff;
            background: rgba(0, 246, 255, 0.1);
        }

        nav a:hover::before {
            width: 80%;
        }

        main {
            padding: 120px 40px 40px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        section {
            margin-bottom: 40px;
            padding: 40px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        section:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 246, 255, 0.2);
            box-shadow: 0 12px 48px rgba(0, 246, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .section-content {
            position: relative;
            z-index: 1;
        }
        
        footer {
            background: rgba(10, 14, 39, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #888;
            text-align: center;
            padding: 30px 40px;
            margin-top: 60px;
        }
        
        footer a {
            color: #00f6ff;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        footer a:hover {
            color: #5927ba;
            text-shadow: 0 0 10px rgba(0, 246, 255, 0.5);
        }
        
        footer p {
            font-size: 14px;
            margin: 0;
        }
        
        .logo {
            float: left;
            margin-right: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 246, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .logo:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 30px rgba(0, 246, 255, 0.5);
        }
        
        p {
            color: #c0c0c0;
            font-size: 16px;
            line-height: 1.8;
            margin: 15px 0;
        }
        
        h1 {
            font-family: 'DYH', serif;
            font-size: 36px;
            background: linear-gradient(135deg, #ffffff 0%, #00f6ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        
        h2 {
            font-family: 'DYH', serif;
            font-size: 28px;
            color: #ffffff;
            margin: 20px 0 15px;
        }
        
        h3 {
            font-family: 'Main', serif;
            font-size: 18px;
            color: #999;
            margin: 15px 0;
            line-height: 1.6;
        }
        
        a {
            color: #00f6ff;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }
        
        a:hover {
            color: #5927ba;
            text-shadow: 0 0 15px rgba(0, 246, 255, 0.6);
        }
        
        .card {
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
            
        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(0, 246, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 246, 255, 0.2);
        }
        
        .hero-section {
            text-align: center;
            padding: 80px 40px;
            background: linear-gradient(135deg, rgba(0, 246, 255, 0.05) 0%, rgba(89, 39, 186, 0.05) 100%);
            border: 1px solid rgba(0, 246, 255, 0.1);
        }
        
        .hero-section h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        .hero-section p {
            font-size: 18px;
            color: #aaa;
            max-width: 600px;
            margin: 0 auto 30px;
        }
        
        .cta-button {
            display: inline-block;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #00f6ff 0%, #5927ba 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 246, 255, 0.3);
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 246, 255, 0.5);
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                padding: 15px 20px;
                gap: 15px;
            }
            
            header h1 {
                font-size: 24px;
            }
            
            nav {
                flex-wrap: wrap;
                justify-content: center;
            }
            
            main {
                padding: 100px 20px 20px;
            }
            
            section {
                padding: 25px;
            }
            
            .hero-section h1 {
                font-size: 32px;
            }
        }
    </style>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        document.body.addEventListener('contextmenu', function(event) {
            event.preventDefault();
        }, false);
    });
    
    document.addEventListener('DOMContentLoaded', function() {
        const card = document.querySelector('.card');

        if (card) {
            card.addEventListener('click', function() {
                const url = card.getAttribute('data-url');
                if (url) {
                    window.location.href = url;
                }
            });
        } else {
            console.error('未找到匹配的 .card 元素。');
        }
    });
    </script>
</head>
<body>
    <header>

        <nav>

        </nav>
    </header>

    <main>

                <p><br><br><br><br><br></p>

            </div>
        </section>
         
        <section id="COMMUNICATION">
            <div class="section-content">
                <h1>交流</h1> 
                <p>Adam001个人QQ:<a href="https://qm.qq.com/q/VoKXMPJdSI" target="_blank">点击联系我吧</a></p>
                <h1>账号</h1> 
                <p>
                    <a href="https://space.bilibili.com/692369412" target="_blank">
                        <img class="logo" src="img\b.png" id="001_TX" width="60">
                    </a>
                </p>
                <h3>
                    <br>注:除以上社交账号外,非Adam001本人持有或未使用,不会发布有关信息，不要轻信以免上当受骗
                </h3>
            </div>
        </section>
    </main>
    
    <footer>
        <p>© 2024-2026 Adam001&ensp;&ensp;&ensp;&ensp;<a href="http://search.adam001.top" target="_blank">001网址导航</a></p>
    </footer>
</body>
</html>
